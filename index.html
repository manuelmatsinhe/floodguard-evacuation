<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Todos</h1>
      <p class="subtitle">Stay organized, one task at a time</p>
    </header>

    <form class="todo-form" id="todo-form">
      <input
        type="text"
        id="todo-input"
        class="todo-input"
        placeholder="What needs to be done?"
        autocomplete="off"
        maxlength="200"
      >
      <button type="submit" class="btn-add" aria-label="Add todo">Add</button>
    </form>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Done</button>
    </div>

    <ul class="todo-list" id="todo-list"></ul>

    <footer class="footer" id="footer" hidden>
      <span class="todo-count" id="todo-count">0 items left</span>
      <button class="btn-clear" id="clear-completed">Clear completed</button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
